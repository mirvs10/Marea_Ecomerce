<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso | Marea Fit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        .success-icon {
            font-size: 80px;
            color: #28a745;
            animation: scaleIn 0.5s ease-in-out;
        }
        @keyframes scaleIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .success-card {
            animation: fadeInUp 0.6s ease-in-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-light">

        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">
                    <img th:src="@{/Imagenes/logo_1.png}" alt="Logo" style="height: 60px;">
                </a>
                <div class="navbar-nav ms-auto">
                    <span class="nav-link text-white" sec:authentication="principal.usuario.nombre">Usuario</span>
                </div>
            </div>
        </nav>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    
                    <div class="card shadow-lg border-0 success-card">
                        <div class="card-body text-center p-5">
                            
                            <div class="success-icon mb-4">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            
                            <h1 class="text-success fw-bold mb-3">¡Pago Exitoso!</h1>
                            
                            <p class="fs-5 text-muted mb-4">
                                Tu pedido ha sido confirmado y está siendo procesado.
                            </p>
                            
                            <div class="bg-light p-4 rounded mb-4">
                                <div class="row text-start">

                                    <div class="col-6">
                                        <small class="text-muted">ID de Pedido:</small>
                                        <p class="mb-0 fw-bold" th:text="${pedido.idPedido}">0000</p>
                                    </div>

                                    <div class="col-6">
                                        <small class="text-muted">Total Pagado:</small>
                                        <p class="mb-0 fw-bold text-success">
                                            S/ <span th:text="${#numbers.formatDecimal(total, 1, 2)}">0.00</span>
                                        </p>
                                    </div>

                                </div>
                            </div>
                            
                            <div class="alert alert-info mb-4">
                                <i class="fas fa-envelope"></i>
                                Hemos enviado un email de confirmación a tu correo electrónico.
                            </div>
                            <div class="d-grid gap-2">
                                <a th:href="@{/mis-pedidos}" class="btn btn-success btn-lg">
                                    <i class="fas fa-shopping-bag"></i> Ver Mis Pedidos
                                </a>
                                <a th:href="@{/carta}" class="btn btn-outline-success">
                                    <i class="fas fa-utensils"></i> Seguir Comprando
                                </a>
                                <a th:href="@{/}" class="btn btn-outline-secondary">
                                    <i class="fas fa-home"></i> Volver al Inicio
                                </a>
                            </div>
                            
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted">
                            <i class="fas fa-truck"></i> 
                            Tu pedido será entregado en 1-2 días hábiles
                        </p>
                    </div>
                    
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
