<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Direcciones | Marea Fit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>

<body>

            <nav class="navbar navbar-expand-lg navbar-dark bg-success">
                <div class="container">
                    <a class="navbar-brand" th:href="@{/}">
                        <img th:src="@{/Imagenes/logo_1.png}" alt="Logo" style="height: 60px;">
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMarea">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarMarea">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/carta}">Carta</a></li>
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/nosotros}">Nosotros</a></li>
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/contacto}">Contacto</a></li>

                            <li sec:authorize="!isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/login}">Ingresar</a>
                            </li>
                            <li sec:authorize="!isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/register}">Registro</a>
                            </li>

                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/mis-pedidos}">Mis Pedidos</a>
                            </li>
                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/carrito}">Carrito</a>
                            </li>
                            
                            <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/admin/dashboard}">Dashboard</a>
                            </li>

                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <span class="nav-link text-white">
                                    Bienvenido, <span sec:authentication="principal.usuario.nombre">Usuario</span>
                                </span>
                            </li>
                            
                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <form th:action="@{/logout}" method="post" class="d-inline m-0">
                                    <button type="submit" class="nav-link text-white bg-transparent border-0">
                                        Cerrar Sesión
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
            <div class="container py-5">
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold">
                        <i class="fas fa-map-marker-alt text-success"></i> Mis Direcciones
                    </h2>
                    <button type="button" 
                            class="btn btn-success" 
                            data-bs-toggle="modal" 
                            data-bs-target="#modalNuevaDireccion">
                        <i class="fas fa-plus"></i> Agregar dirección
                    </button>
                </div>

                <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
                    <i class="fas fa-check-circle"></i> <span th:text="${param.success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
                    <i class="fas fa-exclamation-triangle"></i> <span th:text="${param.error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${direcciones == null || #lists.isEmpty(direcciones)}" 
                    class="text-center py-5">
                    <i class="fas fa-map-marked-alt fa-4x text-muted mb-4"></i>
                    <h4>No tienes direcciones registradas</h4>
                    <p class="text-muted">Agrega una dirección para facilitar tus pedidos</p>
                    <button type="button" 
                            class="btn btn-success mt-3" 
                            data-bs-toggle="modal" 
                            data-bs-target="#modalNuevaDireccion">
                        <i class="fas fa-plus"></i> Agregar primera dirección
                    </button>
                </div>

                <div class="row" th:if="${direcciones != null && !#lists.isEmpty(direcciones)}">
                    
                    <div class="col-md-6 mb-4" th:each="dir : ${direcciones}">
                        <div class="card h-100 shadow-sm">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h5 class="card-title mb-0">
                                        <i class="fas fa-home text-success"></i>
                                        Dirección #<span th:text="${dir.idDireccion}"></span>
                                    </h5>
                                </div>

                                <p class="mb-2">
                                    <i class="fas fa-map-marker-alt text-muted"></i>
                                    <strong th:text="${dir.direccion}"></strong>
                                </p>

                                <p class="mb-2 text-muted">
                                    <i class="fas fa-map text-muted"></i>
                                    <span th:text="${dir.distrito + ', ' + dir.ciudad}"></span>
                                </p>

                                <p th:if="${dir.referencia != null}" class="mb-0 text-muted small">
                                    <i class="fas fa-info-circle"></i>
                                    Ref: <span th:text="${dir.referencia}"></span>
                                </p>

                                <hr>

                                <div class="d-flex gap-2">
                                    <button type="button" 
                                            class="btn btn-sm btn-outline-primary flex-fill"
                                            data-bs-toggle="modal" 
                                            th:data-bs-target="'#modalEditar' + ${dir.idDireccion}">
                                        <i class="fas fa-edit"></i> Editar
                                    </button>

                                    <form th:action="@{/mis-direcciones/eliminar/{id}(id=${dir.idDireccion})}" 
                                        method="post"
                                        onsubmit="return confirm('¿Eliminar esta dirección?');"
                                        class="flex-fill">
                                        <button type="submit" class="btn btn-sm btn-outline-danger w-100">
                                            <i class="fas fa-trash"></i> Eliminar
                                        </button>
                                    </form>
                                </div>

                            </div>
                        </div>

                        <div class="modal fade" th:id="'modalEditar' + ${dir.idDireccion}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header bg-success text-white">
                                        <h5 class="modal-title">
                                            <i class="fas fa-edit"></i> Editar Dirección
                                        </h5>
                                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                    </div>
                                    <form th:action="@{/mis-direcciones/actualizar/{id}(id=${dir.idDireccion})}" method="post">
                                        <div class="modal-body">
                                            <div class="mb-3">
                                                <label class="form-label">Dirección <span class="text-danger">*</span></label>
                                                <input type="text" 
                                                    name="direccion" 
                                                    class="form-control" 
                                                    th:value="${dir.direccion}"
                                                    required>
                                            </div>
                                            <div class="row">
                                                <div class="col-md-6 mb-3">
                                                    <label class="form-label">Distrito <span class="text-danger">*</span></label>
                                                    <input type="text" 
                                                        name="distrito" 
                                                        class="form-control" 
                                                        th:value="${dir.distrito}"
                                                        required>
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                    <label class="form-label">Ciudad <span class="text-danger">*</span></label>
                                                    <input type="text" 
                                                        name="ciudad" 
                                                        class="form-control" 
                                                        th:value="${dir.ciudad}"
                                                        required>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Referencia</label>
                                                <input type="text" 
                                                    name="referencia" 
                                                    class="form-control" 
                                                    th:value="${dir.referencia}">
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                                Cancelar
                                            </button>
                                            <button type="submit" class="btn btn-success">
                                                <i class="fas fa-save"></i> Guardar Cambios
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

            <div class="modal fade" id="modalNuevaDireccion" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-success text-white">
                            <h5 class="modal-title">
                                <i class="fas fa-plus"></i> Nueva Dirección
                            </h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <form th:action="@{/mis-direcciones/guardar}" method="post">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Dirección <span class="text-danger">*</span></label>
                                    <input type="text" 
                                        name="direccion" 
                                        class="form-control" 
                                        placeholder="Ej: Jr. Las Flores 123"
                                        required>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Distrito <span class="text-danger">*</span></label>
                                        <input type="text" 
                                            name="distrito" 
                                            class="form-control" 
                                            placeholder="Ej: Miraflores"
                                            required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Ciudad <span class="text-danger">*</span></label>
                                        <input type="text" 
                                            name="ciudad" 
                                            class="form-control" 
                                            placeholder="Ej: Lima"
                                            required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Referencia</label>
                                    <input type="text" 
                                        name="referencia" 
                                        class="form-control" 
                                        placeholder="Ej: Frente al parque">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                    Cancelar
                                </button>
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-save"></i> Guardar Dirección
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
