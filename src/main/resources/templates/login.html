<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inicio de Sesión - Marea Fit</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/repalash/gilroy-free-webfont@fonts/Gilroy-Light.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/repalash/gilroy-free-webfont@fonts/Gilroy-Extrabold.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- NAVBAR CON SPRING SECURITY -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">
                    <img th:src="@{/Imagenes/logo_1.png}" alt="Logo Marea" style="height: 60px;">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMarea">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarMarea">
                    <div class="navbar-nav ms-auto">
                        <!-- Enlaces comunes -->
                        <a class="nav-link text-white" th:href="@{/carta}">Carta</a>
                        <a class="nav-link text-white" th:href="@{/nosotros}">Nosotros</a>
                        <a class="nav-link text-white" th:href="@{/contacto}">Contacto</a>
                        
                        <!-- ✅ SI NO ESTÁ AUTENTICADO -->
                        <div sec:authorize="!isAuthenticated()" class="d-flex">
                            <a class="nav-link text-white" th:href="@{/login}">Ingresar</a>
                            <a class="nav-link text-white" th:href="@{/register}">Registro</a>
                        </div>
                        
                        <!-- ✅ SI ESTÁ AUTENTICADO -->
                        <div sec:authorize="isAuthenticated()" class="d-flex">
                            <!-- Mis Pedidos (solo clientes autenticados) -->
                            <a class="nav-link text-white" th:href="@{/mis-pedidos}">
                                <i class="fas fa-shopping-bag"></i> Mis Pedidos
                            </a>
                            
                            <!-- Carrito -->
                            <a class="nav-link text-white" th:href="@{/carrito}">
                                <i class="fas fa-shopping-cart"></i> Carrito
                            </a>
                            
                            <!-- Dashboard (solo ADMIN) -->
                            <a sec:authorize="hasRole('ADMIN')" class="nav-link text-white" th:href="@{/admin/dashboard}">
                                <i class="fas fa-tachometer-alt"></i> Dashboard
                            </a>
                            
                            <!-- Nombre del usuario -->
                            <span class="nav-link text-white">
                                Bienvenido, <span sec:authentication="principal.usuario.nombre">Usuario</span>
                            </span>
                            
                            <!-- Logout -->
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="nav-link text-white btn btn-link" style="text-decoration: none;">
                                    Cerrar Sesión
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    <!-- INICIO SESIÓN -->
    <main class="d-flex justify-content-center align-items-center flex-grow-1 my-5">
    <div class="w-100" style="max-width: 400px;">
        <!-- Mensaje de error -->
        <div th:if="${param.error}" class="alert alert-danger text-center mb-3">
            Correo o contraseña incorrectos
        </div>

        <!-- Formulario -->
        <form th:action="@{/procesar-login}" method="post" 
              class="p-4 border rounded-3 shadow-sm bg-white">
            <h2 class="text-center fw-bold text-success mb-4">INICIO SESIÓN</h2>

            <div class="mb-3">
                <label for="correo" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="correo" name="correo" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password')">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100">Ingresar</button>

            <div class="mt-3 text-center">
                ¿No tienes cuenta? <a th:href="@{/register}" class="text-success">Regístrate</a>
            </div>
        </form>
    </div>
</main>


    <!-- FOOTER (consistente con otras páginas) -->
    <footer class="bg-success text-white text-center py-3 mt-auto">
        <p>© 2025 Marea. Todos los derechos reservados.</p>
    </footer>

    <!-- Bootstrap 5 JS y Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"></script>
    <script th:src="@{/js/login.js}"></script>
</body>
</html>
