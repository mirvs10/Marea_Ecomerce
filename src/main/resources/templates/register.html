<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro - Marea Fit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/register.css}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script th:src="@{/js/register.js}"></script>
    <script th:src="@{/js/register-chart.js}"></script>
</head>

<body class="d-flex flex-column min-vh-100">

        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">
                    <img th:src="@{/Imagenes/logo_1.png}" alt="Logo" style="height: 60px;">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMarea">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarMarea">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link text-white" th:href="@{/carta}">Carta</a></li>
                        <li class="nav-item"><a class="nav-link text-white" th:href="@{/nosotros}">Nosotros</a></li>
                        <li class="nav-item"><a class="nav-link text-white" th:href="@{/contacto}">Contacto</a></li>

                        <li sec:authorize="!isAuthenticated()" class="nav-item">
                            <a class="nav-link text-white" th:href="@{/login}">Ingresar</a>
                        </li>
                        <li sec:authorize="!isAuthenticated()" class="nav-item">
                            <a class="nav-link text-white" th:href="@{/register}">Registro</a>
                        </li>

                        <li sec:authorize="isAuthenticated()" class="nav-item">
                            <a class="nav-link text-white" th:href="@{/mis-pedidos}">Mis Pedidos</a>
                        </li>
                        <li sec:authorize="isAuthenticated()" class="nav-item">
                            <a class="nav-link text-white" th:href="@{/carrito}">Carrito</a>
                        </li>
                        
                        <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                            <a class="nav-link text-white" th:href="@{/admin/dashboard}">Dashboard</a>
                        </li>

                        <li sec:authorize="isAuthenticated()" class="nav-item">
                            <span class="nav-link text-white">
                                Bienvenido, <span sec:authentication="principal.usuario.nombre">Usuario</span>
                            </span>
                        </li>
                        
                        <li sec:authorize="isAuthenticated()" class="nav-item">
                            <form th:action="@{/logout}" method="post" class="d-inline m-0">
                                <button type="submit" class="nav-link text-white bg-transparent border-0">
                                    Cerrar Sesión
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

            <main class="container my-5 flex-grow-1">

                <div class="text-center mb-4">
                    <h2 class="fs-1 fw-bold text-success">REGÍSTRATE</h2>
                </div>

                <div th:if="${error}" class="alert alert-danger text-center mx-auto" style="max-width: 500px;" th:text="${error}"></div>

                <div class="row justify-content-center align-items-center">

                    <div class="col-md-6 mb-4">
                        <canvas id="registroChart" width="400" height="300"></canvas>

                        <p class="text-center mt-3 text-success fw-bold">
                            ¡Más personas están cambiando sus vidas con nosotros! <br>
                            <span class="text-dark">Regístrate ya.</span>
                        </p>
                    </div>

                    <div class="col-md-6">
                        <form th:action="@{/register}" th:object="${usuario}" method="post"
                            class="p-4 border rounded-3 shadow-sm bg-white">

                            <div class="mb-3">
                                <label class="form-label">Nombre completo</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" th:field="*{correo}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" th:field="*{telefono}" class="form-control"
                                    pattern="[0-9]{9,10}" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <div class="input-group">
                                    <input type="password" th:field="*{password}" id="password" class="form-control" required>
                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password')">👁</button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Confirmar Contraseña</label>
                                <input type="password" class="form-control" id="confirmarPassword" name="confirmarPassword" required>
                            </div>

                            <button type="submit" class="btn btn-success w-100">Registrarme</button>

                            <div class="mt-3 text-center">
                                ¿Ya tienes cuenta? <a th:href="@{/login}" class="text-success">Inicia sesión</a>
                            </div>

                        </form>
                    </div>
                </div>
            </main>

            <footer class="bg-success text-white text-center py-3 mt-auto">
                <p>© 2025 Marea. Todos los derechos reservados.</p>
            </footer>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
