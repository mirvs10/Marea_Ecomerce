<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Acceso Denegado - Marea Fit</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/repalash/gilroy-free-webfont@fonts/Gilroy-Light.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/repalash/gilroy-free-webfont@fonts/Gilroy-Extrabold.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Gilroy-Light', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Gilroy-Extrabold', sans-serif;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

            <nav class="navbar navbar-expand-lg navbar-dark bg-success">
                <div class="container">
                    <a class="navbar-brand" th:href="@{/}">
                        <img th:src="@{/Imagenes/logo_1.png}" alt="Logo" style="height: 60px;">
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMarea">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarMarea">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/carta}">Carta</a></li>
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/nosotros}">Nosotros</a></li>
                            <li class="nav-item"><a class="nav-link text-white" th:href="@{/contacto}">Contacto</a></li>

                            <li sec:authorize="!isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/login}">Ingresar</a>
                            </li>
                            <li sec:authorize="!isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/register}">Registro</a>
                            </li>

                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/mis-pedidos}">Mis Pedidos</a>
                            </li>
                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/carrito}">Carrito</a>
                            </li>
                            
                            <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                                <a class="nav-link text-white" th:href="@{/admin/dashboard}">Dashboard</a>
                            </li>

                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <span class="nav-link text-white">
                                    Bienvenido, <span sec:authentication="principal.usuario.nombre">Usuario</span>
                                </span>
                            </li>
                            
                            <li sec:authorize="isAuthenticated()" class="nav-item">
                                <form th:action="@{/logout}" method="post" class="d-inline m-0">
                                    <button type="submit" class="nav-link text-white bg-transparent border-0">
                                        Cerrar Sesión
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>


            <main class="container text-center my-5 flex-grow-1">

                <h1 class="text-danger fw-bold mb-4">Acceso Denegado</h1>

                <p class="fs-5 mb-4">
                    No tienes permisos para acceder a esta sección.
                </p>

                <img th:src="@{/Imagenes/denied.png}" alt="Acceso Denegado"
                    class="img-fluid mb-4" style="max-width: 250px;"
                    onerror="this.style.display='none'">

                <a th:href="@{/}" class="btn btn-success px-4 py-2 mt-3">
                    Volver al inicio
                </a>

            </main>

            <footer class="bg-success text-white text-center py-3 mt-auto">
                <p>© 2025 Marea. Todos los derechos reservados.</p>
            </footer>


            <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js"></script>

</body>
</html>
